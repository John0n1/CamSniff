[bashate]
# E003: indent not multiple of 4 — project uses shfmt 2-space indentation
# E006: line too long — port lists, build commands, and URLs exceed 79 chars by design
# E043: arithmetic compound return semantics — patterns are guarded with &&/|| chains
# E044: use [[ for comparisons — false positives from usage-text heredocs
ignore = E003,E006,E043,E044
