---
extends: default
rules:
  line-length:
    max: 120
    level: warning
  document-start:
    level: warning
  truthy:
    allowed-values: ["true", "false", "on", "off", "yes", "no"]
    level: warning
  comments:
    min-spaces-from-content: 1
    level: warning
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
