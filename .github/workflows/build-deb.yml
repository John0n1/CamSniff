name: Build .deb package

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deb_name: ${{ steps.artifacts.outputs.deb_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper debhelper-compat dpkg-dev

      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Move and locate build artifacts
        id: artifacts
        run: |
          set -euo pipefail
          mapfile -t DEBS < <(find "$GITHUB_WORKSPACE/.." -maxdepth 1 -type f -name '*.deb' | sort)

          if [ "${#DEBS[@]}" -eq 0 ]; then
            echo "Error: no .deb package was produced by dpkg-buildpackage." >&2
            exit 1
          fi

          if [ "${#DEBS[@]}" -gt 1 ]; then
            echo "Error: multiple .deb packages were produced; expected exactly one." >&2
            printf 'Matches:\n' >&2
            printf '  %s\n' "${DEBS[@]}" >&2
            exit 1
          fi

          DEB_NAME="$(basename "${DEBS[0]}")"
          mv "${DEBS[0]}" "$GITHUB_WORKSPACE/$DEB_NAME"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.deb_name }}
          path: ${{ github.workspace }}/${{ steps.artifacts.outputs.deb_name }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ needs.build.outputs.deb_name }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: dist/${{ needs.build.outputs.deb_name }}
          generate_release_notes: true
